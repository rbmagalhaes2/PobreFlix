<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>PobreFlix Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player" style="width: 100%; height: 100vh;"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('imdb');
        if (imdbId) {
            // Este player é o que costuma funcionar com o prefixo 'play' que você mencionou
            document.getElementById('player').innerHTML = 
                `<iframe src="https://vidsrc.me/embed/movie?imdb=${imdbId}" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
