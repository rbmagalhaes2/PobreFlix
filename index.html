<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Filmes</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player-container" style="width: 100%; height: 100%;">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abre o Web App em tela cheia

        // Pegamos o ID do filme que o bot vai passar pela URL
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        if (movieId) {
            // Ajuste a URL abaixo de acordo com a documentação da Vidapi
            const playerUrl = `https://vidapi.ru/embed/${movieId}`; 
            document.getElementById('player-container').innerHTML = 
                `<iframe src="${playerUrl}" allowfullscreen></iframe>`;
        } else {
            document.body.innerHTML = "<h2 style='color:white; text-align:center;'>Filme não encontrado.</h2>";
        }
    </script>
</body>
</html>
